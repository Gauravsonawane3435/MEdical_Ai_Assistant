services:
  - type: web
    name: medical-ai-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_TOKEN
        sync: false # The user will enter their Hugging Face token in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
